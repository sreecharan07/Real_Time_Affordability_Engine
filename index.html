    <script>
      window.onerror = function(msg, url, line, col, error) {
        var root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          root.innerHTML = '<div style="padding: 20px; color: #ff4444; font-family: sans-serif;">' +
            '<h2>Application Error</h2>' +
            '<p>' + msg + '</p>' +
            '<small>Please check your environment variables and console logs.</small>' +
            '</div>';
        }
        return false;
      };
